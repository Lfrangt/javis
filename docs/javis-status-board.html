<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JAVIS 本地进度看板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #151b23;
      --panel-2: #1b232e;
      --line: #303946;
      --text: #edf2f7;
      --muted: #9aa7b5;
      --ready: #47d18c;
      --running: #6bb8ff;
      --warning: #ffd166;
      --blocked: #ff6b6b;
      --unknown: #a9b3c1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .summary {
      max-width: 840px;
      color: var(--muted);
      margin: 0;
    }

    .meta {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: var(--panel);
      margin-bottom: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--unknown);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--unknown), transparent 80%);
      flex: 0 0 auto;
    }

    .ready .dot { background: var(--ready); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ready), transparent 80%); }
    .running .dot { background: var(--running); box-shadow: 0 0 0 3px color-mix(in srgb, var(--running), transparent 80%); }
    .warning .dot { background: var(--warning); box-shadow: 0 0 0 3px color-mix(in srgb, var(--warning), transparent 80%); }
    .blocked .dot { background: var(--blocked); box-shadow: 0 0 0 3px color-mix(in srgb, var(--blocked), transparent 80%); }

    main {
      display: grid;
      gap: 22px;
      margin-top: 22px;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .voice-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .voice-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .voice-title {
      display: flex;
      gap: 9px;
      align-items: center;
      margin: 0 0 6px;
      font-size: 19px;
      line-height: 1.25;
    }

    .voice-title .dot {
      width: 12px;
      height: 12px;
    }

    .voice-panel p {
      margin: 0;
      color: var(--muted);
    }

    .voice-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .voice-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
    }

    .voice-metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 12px;
      min-height: 94px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric-value {
      color: var(--text);
      font-size: 14px;
      line-height: 1.35;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
    }

    .check {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f151d;
      padding: 12px;
      min-height: 130px;
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .check h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }

    .check p {
      font-size: 12px;
    }

    .check.ready { border-color: color-mix(in srgb, var(--ready), var(--line) 60%); }
    .check.warning { border-color: color-mix(in srgb, var(--warning), var(--line) 60%); }
    .check.blocked { border-color: color-mix(in srgb, var(--blocked), var(--line) 60%); }

    .nodes {
      display: grid;
      grid-template-columns: repeat(7, minmax(118px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .node {
      position: relative;
      min-height: 164px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
    }

    .node::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      border-radius: 8px 0 0 8px;
      background: var(--unknown);
    }

    .node.ready::before { background: var(--ready); }
    .node.running::before { background: var(--running); }
    .node.warning::before { background: var(--warning); }
    .node.blocked::before { background: var(--blocked); }

    .node-head {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .node h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .pill {
      width: fit-content;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .node p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .next {
      color: var(--text);
      font-size: 13px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .timeline {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(5, minmax(160px, 1fr));
    }

    .step {
      padding: 13px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 128px;
    }

    .step h3 {
      margin: 8px 0 6px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .step p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 15px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }

    li + li { margin-top: 6px; }

    code {
      color: var(--text);
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 1px 5px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .error {
      padding: 14px;
      border: 1px solid color-mix(in srgb, var(--blocked), transparent 45%);
      border-radius: 8px;
      background: color-mix(in srgb, var(--blocked), transparent 88%);
      color: var(--text);
    }

    @media (max-width: 980px) {
      .nodes { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .timeline { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .voice-grid, .checks { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .footer-grid { grid-template-columns: 1fr; }
      header { grid-template-columns: 1fr; }
      .voice-head { grid-template-columns: 1fr; }
      .voice-meta { justify-content: flex-start; }
      .meta { text-align: left; }
    }

    @media (max-width: 560px) {
      .shell { width: min(100vw - 20px, 1180px); padding-top: 18px; }
      .nodes, .timeline, .voice-grid, .checks { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1 id="headline">JAVIS 本地进度看板</h1>
        <p class="summary" id="summary">正在读取本机 resident 状态。</p>
      </div>
      <div class="meta">
        <div class="status unknown" id="overall"><span class="dot"></span><span>连接中</span></div>
        <div id="updated">尚未更新</div>
        <div>自动刷新：<span id="refresh">5s</span></div>
      </div>
    </header>

    <main>
      <section class="voice-panel" id="voice-panel"></section>

      <section>
        <p class="section-title">节点状态</p>
        <div class="nodes" id="nodes"></div>
      </section>

      <section>
        <p class="section-title">最近工作</p>
        <div class="timeline" id="timeline"></div>
      </section>

      <section class="footer-grid">
        <div class="panel">
          <p class="section-title">下一步</p>
          <ul id="next"></ul>
        </div>
        <div class="panel">
          <p class="section-title">安全边界</p>
          <ul id="safety"></ul>
        </div>
      </section>

      <div id="error"></div>
    </main>
  </div>

  <script>
    const endpoint = new URLSearchParams(location.search).get("api") || "http://127.0.0.1:3417/api/progress-board";
    let refreshMs = 5000;

    const statusText = {
      ready: "正常",
      running: "进行中",
      warning: "注意",
      blocked: "阻塞",
      unknown: "未知"
    };

    function el(tag, attrs = {}, text = "") {
      const node = document.createElement(tag);
      for (const [key, value] of Object.entries(attrs)) {
        if (key === "class") node.className = value;
        else node.setAttribute(key, value);
      }
      if (text) node.textContent = text;
      return node;
    }

    function statusClass(status) {
      const value = String(status || "").toLowerCase();
      if (["ready", "ok", "done", "realtime_ready"].includes(value)) return "ready";
      if (["running", "active", "in_progress"].includes(value)) return "running";
      if (["blocked", "failed", "error", "unsafe_cloud"].includes(value)) return "blocked";
      if (["warning", "degraded", "attention", "zero_spend_locked", "realtime_blocked", "needs_provider_probe", "manual_required", "needs_user"].includes(value)) return "warning";
      return "unknown";
    }

    function renderNode(item) {
      const status = statusClass(item.status);
      const card = el("article", { class: `node ${status}` });
      const head = el("div", { class: "node-head" });
      head.append(el("span", { class: "dot" }));
      head.append(el("h2", {}, item.label || item.id || "节点"));
      card.append(head);
      card.append(el("div", { class: "pill" }, statusText[status] || status));
      card.append(el("p", {}, item.summary || ""));
      card.append(el("div", { class: "next" }, item.next || "暂无下一步"));
      return card;
    }

    function renderStep(item) {
      const status = statusClass(item.status);
      const card = el("article", { class: `step ${status}` });
      card.append(el("span", { class: "status " + status }, statusText[status] || status));
      card.querySelector(".status").prepend(el("span", { class: "dot" }));
      card.append(el("h3", {}, item.title || item.id || "工作节点"));
      card.append(el("p", {}, item.body || ""));
      return card;
    }

    function renderMetric(label, value) {
      const card = el("div", { class: "voice-metric" });
      card.append(el("div", { class: "metric-label" }, label));
      card.append(el("div", { class: "metric-value" }, value || "暂无"));
      return card;
    }

    function renderCheck(item) {
      const status = statusClass(item.status || item.rawStatus);
      const card = el("article", { class: `check ${status}` });
      card.append(el("span", { class: "status " + status }, statusText[status] || status));
      card.querySelector(".status").prepend(el("span", { class: "dot" }));
      card.append(el("h3", {}, item.label || item.id || "检查项"));
      card.append(el("p", {}, item.detail || ""));
      if (item.command) card.append(el("code", {}, item.command));
      return card;
    }

    function spendLabel(spend = {}) {
      const base = `cloud=${spend.mode || "-"} · ${spend.allowedToday ?? 0}/${spend.dailyRequestLimit ?? 0} · remaining=${spend.remainingTotal ?? 0}`;
      const gates = [
        spend.requireSpendLease ? "一次性 lease" : "",
        spend.requireSpendConfirmationPhrase ? "确认短语" : ""
      ].filter(Boolean).join(" + ");
      return gates ? `${base} · ${gates}` : base;
    }

    function renderVoiceSetup(setup = {}) {
      const panel = document.getElementById("voice-panel");
      panel.innerHTML = "";
      const status = statusClass(setup.status || setup.rawStatus);

      const head = el("div", { class: "voice-head" });
      const copy = el("div");
      const title = el("h2", { class: `voice-title ${status}` });
      title.append(el("span", { class: "dot" }));
      title.append(el("span", {}, setup.label || "实时语音上线检查"));
      copy.append(title);
      copy.append(el("p", {}, setup.summary || "正在读取实时语音状态。"));
      if (setup.nextAction) copy.append(el("p", {}, `下一步：${setup.nextAction}`));

      const meta = el("div", { class: "voice-meta" });
      meta.append(el("span", { class: `status ${status}` }, statusText[status] || status));
      meta.querySelector(".status").prepend(el("span", { class: "dot" }));
      meta.append(el("span", { class: "pill" }, setup.localFallback?.available ? "本地兜底可用" : "本地兜底未知"));
      meta.append(el("span", { class: "pill" }, setup.forensics?.likelyBillableFromJavis ? "今日疑似花费" : "今日未见 JAVIS 花费"));
      head.append(copy);
      head.append(meta);
      panel.append(head);

      const grid = el("div", { class: "voice-grid" });
      grid.append(renderMetric("麦克风", `${setup.microphone?.ready ? "ready" : "needs user"} · ${setup.microphone?.status || "-"}`));
      grid.append(renderMetric("Provider", `${setup.provider?.ready ? "ready" : setup.provider?.status || "-"} · ${setup.provider?.kind || "-"}`));
      grid.append(renderMetric("费用保护", spendLabel(setup.spendGuard || {})));
      grid.append(renderMetric("本地兜底", `${setup.localFallback?.endpoint || "/api/voice/command"} · ${setup.localFallback?.command || "npm run voice:chat"}`));
      panel.append(grid);

      const checks = el("div", { class: "checks" });
      for (const item of setup.goLiveChecklist || []) checks.append(renderCheck(item));
      if (!checks.children.length) checks.append(el("p", {}, "暂无上线检查项。"));
      panel.append(checks);
    }

    function renderList(target, items) {
      target.innerHTML = "";
      for (const item of items) target.append(el("li", {}, item));
      if (!items.length) target.append(el("li", {}, "暂无"));
    }

    function renderSafety(safety = {}) {
      const rows = [
        ["不返回 API token", safety.returnsApiToken === false],
        ["不返回 OpenAI key", safety.returnsOpenAiKey === false],
        ["不返回屏幕图像", safety.returnsScreenImage === false],
        ["不读取剪贴板正文", safety.returnsClipboardText === false],
        ["不调用 OpenAI", safety.callsOpenAi === false],
        ["不启动麦克风/Realtime", safety.startsMicrophone === false && safety.usesRealtime === false],
        ["不执行电脑动作", safety.executesActions === false]
      ];
      return rows.map(([label, ok]) => `${ok ? "OK" : "CHECK"} · ${label}`);
    }

    async function refresh() {
      try {
        const response = await fetch(endpoint, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const board = data.board || data;
        refreshMs = Number(board.refreshMs || 5000);

        const overall = document.getElementById("overall");
        const status = statusClass(board.status);
        overall.className = `status ${status}`;
        overall.innerHTML = "";
        overall.append(el("span", { class: "dot" }));
        overall.append(el("span", {}, statusText[status] || status));

        document.getElementById("headline").textContent = board.headline || "JAVIS 本地进度看板";
        document.getElementById("summary").textContent = board.summary || "";
        document.getElementById("updated").textContent = board.generatedAt ? `更新：${new Date(board.generatedAt).toLocaleString()}` : "已更新";
        document.getElementById("refresh").textContent = `${Math.round(refreshMs / 1000)}s`;

        renderVoiceSetup(board.voiceSetup || {});

        const nodes = document.getElementById("nodes");
        nodes.innerHTML = "";
        for (const item of board.nodes || []) nodes.append(renderNode(item));

        const timeline = document.getElementById("timeline");
        timeline.innerHTML = "";
        for (const item of board.timeline || []) timeline.append(renderStep(item));

        renderList(document.getElementById("next"), board.nextActions || []);
        renderList(document.getElementById("safety"), renderSafety(board.safety || {}));
        document.getElementById("error").innerHTML = "";
      } catch (error) {
        document.getElementById("error").innerHTML = `<div class="error">看板暂时连不上本机 JAVIS：${String(error.message || error)}。确认 resident 在运行后刷新页面。</div>`;
      } finally {
        window.setTimeout(refresh, refreshMs);
      }
    }

    refresh();
  </script>
</body>
</html>
